# Publishes the Maven artifact to GitHub Packages (see repo "Packages" tab).
# JitPack (jitpack.io) is separate and does not populate this registry.
#
# Auth: GitHub Packages expects Basic auth. We write settings-ci.xml explicitly and pass -s
# because setup-java-generated ~/.m2/settings.xml can still yield 401 with maven-deploy-plugin.
#
# Optional secret PACKAGES_WRITE_TOKEN = classic PAT with write:packages (if GITHUB_TOKEN is blocked).
name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Write Maven settings for GitHub Packages
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.PACKAGES_WRITE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PY'
          import os
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          user = os.environ["MAVEN_USERNAME"]
          token = os.environ["MAVEN_PASSWORD"]
          path = workspace / "settings-ci.xml"
          # CDATA avoids XML escaping issues in tokens; id must match pom distributionManagement/repository/id.
          xml = f"""<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>{user}</username>
                <password><![CDATA[{token}]]></password>
              </server>
            </servers>
          </settings>
          """
          path.write_text(xml, encoding="utf-8")
          PY

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Deploy to GitHub Packages
        run: ./mvnw --batch-mode -e -s "${GITHUB_WORKSPACE}/settings-ci.xml" deploy
