# Publishes the Maven artifact to GitHub Packages (see repo "Packages" tab).
# JitPack (jitpack.io) is separate and does not populate this registry.
name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      # Without +x, Linux runners often fail with "Permission denied" on ./mvnw
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --batch-mode -e deploy
