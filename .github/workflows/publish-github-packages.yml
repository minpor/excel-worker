# Publishes the Maven artifact to GitHub Packages (see repo "Packages" tab).
# JitPack (jitpack.io) is separate and does not populate this registry.
#
# If deploy fails with 401: repo Settings → Actions → General → Workflow permissions
# must be "Read and write permissions" (not read-only), or use a PAT (secret below).
name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default GITHUB_TOKEN must be allowed to write packages (see comment above).
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          # repository_owner matches maven.pkg.github.com/OWNER/repo URL; actor is usually the same.
          server-username: ${{ github.repository_owner }}
          # Optional: create repo secret PACKAGES_WRITE_TOKEN = PAT with write:packages if GITHUB_TOKEN is read-only.
          server-password: ${{ secrets.PACKAGES_WRITE_TOKEN || secrets.GITHUB_TOKEN }}

      # Without +x, Linux runners often fail with "Permission denied" on ./mvnw
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --batch-mode -e deploy
